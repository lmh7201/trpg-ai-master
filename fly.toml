# fly.toml app configuration file generated for trpg-ai-master on 2026-03-13T06:59:47Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'trpg-ai-master'
primary_region = 'sin'
kill_signal = 'SIGTERM'

[build]

[mounts]
  source = "campaign_data"
  destination = "/data"

[env]
  PHX_HOST = 'trpg-ai-master.fly.dev'
  PORT = '8080'
  DATA_DIR = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
